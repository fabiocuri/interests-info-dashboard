apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Target namespace (already exists and is Goldilocks-labelled in the cluster).
namespace: demo

resources:
  - pvc.yaml
  - deployment.yaml
  - service.yaml

# NOTE: the ANTHROPIC_API_KEY Secret is created out-of-band so the real key
# never lives in a manifest. See k8s/secret.example.yaml and the README.
