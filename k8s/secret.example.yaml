# Template only — do NOT commit a real key here.
# Preferred: create the Secret imperatively from your .env so the key stays
# out of version control (see README). This file documents the shape.
apiVersion: v1
kind: Secret
metadata:
  name: interests-info-dashboard
  namespace: demo
type: Opaque
stringData:
  ANTHROPIC_API_KEY: sk-ant-...
  # Read-only Gmail inbox panel (optional). App password, not your login password.
  GMAIL_ADDRESS: you@gmail.com
  GMAIL_APP_PASSWORD: xxxx xxxx xxxx xxxx
  # Today's agenda panel (optional): Google Calendar secret iCal URL.
  CALENDAR_ICS_URL: https://calendar.google.com/calendar/ical/.../basic.ics
  # Spotify track player on the globe (optional).
  SPOTIFY_CLIENT_ID: ""
  SPOTIFY_CLIENT_SECRET: ""
  # Manual API credit balance shown in the spend card (optional).
  CLAUDE_API_BALANCE: ""
  # GitHub panel (optional): a personal access token (repo + notifications read).
  GITHUB_TOKEN: ""
